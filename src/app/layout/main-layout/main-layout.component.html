<div class="d-flex min-vh-100">
  <tm-sidebar
    [brandName]="'Groom'"
    [brandColor]="'#ffc107'"
    [showBrandName]="true"
    [brandScale]="1.8"
    [headerPaddingTop]="24"
    [logoUrl]="'/logo.png'"
    logoUrlCollapsed="/logo.png"
    [logoScale]="0.4"
    [avatarBgColor]="avatarColor"
    [menuItems]="menuItems"
    [currentUser]="currentUser"
    [isCollapsed]="isCollapsed()"
    [isDarkMode]="themeService.isDarkMode()"
    (onLogout)="handleLogout()"
    (onToggleCollapse)="handleToggleCollapse($event)"
    (onThemeToggle)="handleThemeToggle()"
    (onItemClick)="handleItemClick($event)"
  ></tm-sidebar>

  <div
    class="content-wrapper d-flex flex-column flex-grow-1 min-vh-100 transition-all"
    style="background-color: var(--tm-bg-color)"
  >
    <main class="flex-grow-1 p-4 overflow-auto">
      <router-outlet></router-outlet>
    </main>
    <footer
      class="p-3 text-center border-top"
      style="
        background-color: var(--tm-surface-color);
        border-color: var(--tm-border-color) !important;
      "
    >
      <small class="tm-text-muted">&copy; 2026 Groom. All rights reserved.</small>
    </footer>
  </div>
</div>
